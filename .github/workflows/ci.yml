concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .tool-versions
      - name: run `bun ci`
        run: bun ci
      - name: run `bun biome ci`
        run: bun biome ci
  typecheck:
    defaults:
      run:
        working-directory: ${{ matrix.working-directory }}
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: setup bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .tool-versions
      - name: run `bun ci`
        run: bun ci
      - name: run `bun tsc --noEmit`
        run: bun tsc --noEmit
    strategy:
      fail-fast: true
      matrix:
        working-directory:
          - packages/schema
on:
  merge_group:
  pull_request:
  push:
    branches:
      - master
